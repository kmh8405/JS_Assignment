<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Fetch API</h1>

    <!-- GET -->
    <button id="load">데이터 불러오기</button>
    <ol id="list"></ol>

    <!-- POST -->
    <input type="text" id="email">
    <button id="send">데이터 전송하기</button>
    <pre id="result"></pre>

    <script>
        // GET
        const loadBtn = document.querySelector("#load");
        const list = document.querySelector("#list");

        loadBtn.addEventListener("click", () => {
            list.innerHTML = "";

            fetch('https://jsonplaceholder.typicode.com/posts')
                .then(response => response.json())
                .then(posts => {
                    // python에서의 posts[:5]
                    // 서버에서 조회한 데이터(posts) 5개의 제목을 동적으로 li로 추가
                    for (const post of posts.slice(0, 5)) { // 5개
                        const li = document.createElement("li"); // 동적으로 요소 생성(li)
                        li.textContent = post.title;
                        list.appendChild(li);
                    }

                    // 참고로 제목, 내용 다 나오게 하려면 이렇게 하면 된다. (innerHTML 사용)
                    // for (const post of posts.slice(0, 5)) {
                    //     const li = document.createElement("li");

                    //     li.innerHTML = `
                    //         <strong>제목:</strong> ${post.title}<br>
                    //         <strong>본문:</strong> ${post.body}
                    //     `;

                    //     list.appendChild(li);
                    // }
                })    
        });

        // POST
        const input = document.querySelector("#email");
        const sendBtn = document.querySelector("#send");
        const result = document.querySelector("#result");

        sendBtn.addEventListener("click", () => {
            // email을 서버로 전송하고, 응답 결과를 JSON 출력
            fetch("https://jsonplaceholder.typicode.com/posts",
                {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email: input.value}),
                }
            )
                .then(response => response.json())
                .then(data => {
                    result.textContent = JSON.stringify(data, null, 2); // 2칸씩 들여쓰기
                })
        });
    </script>
</body>
</html>
